<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dona Ora - Vita Libera</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .form-container {
      width: 100%;
      max-width: 500px;
      background-color: #f9f9f9;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    }

    .form-container input,
    .form-container label,
    .form-container button {
      width: 100%;
    }

    .form-container input {
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .form-container button {
      padding: 12px;
      background-color: #bb1e1e;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    .form-container button:hover {
      background-color: #a01919;
    }

    .donation-image {
      width: 100%;
      max-width: 600px;
      border-radius: 10px;
      display: block;
      margin: 30px auto;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    #thankYouMsg {
      text-align: center;
      font-size: 18px;
      color: #4CAF50;
    }

    .home-button {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 24px;
      background-color: #bb1e1e;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .home-button:hover {
      background-color: #a01919;
    }
  </style>
</head>
<body>
<header>
  <h1 style="text-align: center;">Dona Ora</h1>
  <h2 id="test2" style="text-align: center;">Sostieni la nostra causa con una donazione</h2>
</header>

<main>
  <div class="form-container">
    <form id="donationForm" action="invia.php" method="POST">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" required>

      <label for="cognome">Cognome:</label>
      <input type="text" id="cognome" name="cognome" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="importo">Importo (€):</label>
      <input type="number" id="importo" name="importo" required min="1" step="0.01">

      <button type="submit">Invia Donazione</button>
    </form>
    <p id="thankYouMsg" style="display:none; margin-top: 20px;">Grazie per la tua generosità!</p>
  </div>

  <img src="https://www.ilfilo-smi.it/wp-content/uploads/Dipendenza-da-sostanze-stupefacenti-1030x773.jpg" alt="Persona in difficoltà" class="donation-image">

  <!-- Bottone per tornare alla Home -->
  <a href="index.html" class="home-button">Torna alla Home</a>
</main>

<footer>
  <p style="text-align: center;">&copy; 2025 Associazione Vita Libera</p>
</footer>

<script>
  document.getElementById('donationForm').addEventListener('submit', function(e) {
    document.getElementById('thankYouMsg').style.display = 'block';
  });
</script>
</body>
</html>
